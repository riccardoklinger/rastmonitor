services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  martin:
    image: maplibre/martin:latest
    restart: unless-stopped
    volumes:
      - ./tiles:/tiles:ro
    command: ["/tiles"]
    # Not exposed to the host — reached only via Next.js proxy at /tiles/*

  ingestion:
    build: ./ingestion
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      STATIC_ENDPOINT: ${STATIC_ENDPOINT}
      DYNAMIC_ENDPOINT: ${DYNAMIC_ENDPOINT}
      CERT_FILE: /certs/client.p12
      P12_PASSWORD: ${P12_PASSWORD}
    volumes:
      - ${CERT_P12}:/certs/client.p12:ro

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      martin:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MARTIN_URL: http://martin:3000
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  db_data:

